	<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<title>Form Submission</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>
	<!-- the entire body must be written by student -->

	<form method="post">
		<!-- Name Filed -->
		<label for="name">Name</label>
		<input type="text" id="name" name="name" required placeholder="Name">
<!-- Email Filed -->
		<label for="email">Email</label>
		<input type="email" id="email" name="email" required placeholder="Email">
<!-- Gender Filed -->
		<p>Gender</p>
		<input type="radio" id="male" name="gender" value="male" required>
		<label for="male">Male</label>
		
		<input type="radio" id="female" name="gender" value="female" required>
		<label for="female">Female</label>
<!-- Brand Filed -->
		<label for="laptops">Laptop Brands</label>
		<select id="laptops" name="laptop">
			<option value="" disabled selected>Choose one Laptop</option>
			<option value="Apple">Apple</option>
			<option value="Ausu">Asus</option>
			<option value="HP">HP</option>
		</select>
<!-- Age Filed -->
		<label for="age">Age</label>
		<input type="number" id="age" name="age" required placeholder="Age">
<!-- DOB Filed -->
		<label for="dob">Date of Birth</label>
		<input type="date" id="dob" name="dob" required>
				<!-- Password Filed -->
		<label for="password">Password</label>
		<input type="password" id="password" name="password" required>
<!-- Url Filed -->
		<label for="portfolio">Portfolio URL</label>
		<input type="url" id="portfolio" name="portfolio" placeholder="https://shreyaskulkarni-kohl.vercel.app/" required>
		<!---Submit field---> 
		<button type="submit">Submit</button>
	</form>

	<script type="text/javascript" src="./script.js"></script>
</body>
</html>
